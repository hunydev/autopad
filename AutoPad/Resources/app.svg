<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BCF2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="216" height="216" rx="32" ry="32" fill="url(#grad1)"/>
  <!-- Clipboard base -->
  <rect x="60" y="70" width="136" height="150" rx="8" ry="8" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="90" y="50" width="76" height="40" rx="6" ry="6" fill="white"/>
  <rect x="100" y="40" width="56" height="24" rx="12" ry="12" fill="#0078D4"/>
  <!-- Text lines -->
  <rect x="80" y="110" width="96" height="12" rx="3" fill="#0078D4" opacity="0.7"/>
  <rect x="80" y="135" width="72" height="12" rx="3" fill="#0078D4" opacity="0.5"/>
  <rect x="80" y="160" width="84" height="12" rx="3" fill="#0078D4" opacity="0.5"/>
  <!-- Edit pencil -->
  <g transform="translate(150, 170) rotate(-45)">
    <rect x="0" y="0" width="50" height="16" rx="2" fill="#FF8C00"/>
    <polygon points="50,0 50,16 62,8" fill="#FFB347"/>
    <rect x="-8" y="2" width="10" height="12" rx="1" fill="#FFD700"/>
  </g>
</svg>
